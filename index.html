<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="我的助理"/>
<title>我的每日助理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css"/>
<style>
:root {
  --bg: #ffffff; --bg2: #f5f5f5; --bg3: #ececec;
  --text: #1a1a1a; --text2: #555; --text3: #999;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --success: #2d8a4e; --success-bg: #eaf3de;
  --danger: #c0392b; --danger-bg: #fcebeb;
  --info: #1a6fb5; --info-bg: #e6f1fb;
  --warn: #a05c00; --warn-bg: #faeeda;
  --radius: 10px; --radius-lg: 14px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e; --bg2: #2c2c2e; --bg3: #3a3a3c;
    --text: #f2f2f7; --text2: #aeaeb2; --text3: #636366;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --success: #6fcf97; --success-bg: #173404;
    --danger: #ff6b6b; --danger-bg: #501313;
    --info: #5baef0; --info-bg: #042c53;
    --warn: #f0a500; --warn-bg: #412402;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
.app { max-width: 430px; margin: 0 auto; background: var(--bg3); min-height: 100vh; padding-bottom: 80px; }
.header { background: var(--bg); padding: 56px 20px 16px; border-bottom: 0.5px solid var(--border); }
.header-row { display: flex; justify-content: space-between; align-items: flex-start; }
.greeting { font-size: 22px; font-weight: 600; color: var(--text); }
.subdate { font-size: 13px; color: var(--text2); margin-top: 2px; }
.streak-badge { background: var(--warn-bg); color: var(--warn); font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 20px; }
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--bg); border-top: 0.5px solid var(--border); display: flex; padding: 8px 0 20px; z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; border: none; background: none; cursor: pointer; padding: 4px 0; color: var(--text3); font-size: 10px; }
.nav-item i { font-size: 22px; }
.nav-item.active { color: var(--info); }
.panel { display: none; padding: 16px; }
.panel.active { display: block; }
.sec-label { font-size: 11px; font-weight: 600; letter-spacing: .07em; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; margin-top: 4px; }
.card { background: var(--bg); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; }
.task-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.task-item:last-of-type { border-bottom: none; padding-bottom: 0; }
.chk { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.chk.done { background: var(--success-bg); border-color: var(--success); }
.chk.done::after { content:''; width:9px; height:9px; background: var(--success); border-radius:50%; }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.4; }
.task-title.done { text-decoration: line-through; color: var(--text3); }
.task-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px; font-size: 18px; flex-shrink: 0; }
.ttag { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 6px; margin-right: 4px; }
.t-morning { background: var(--warn-bg); color: var(--warn); }
.t-noon { background: var(--info-bg); color: var(--info); }
.t-night { background: var(--bg2); color: var(--text2); }
.t-weekend { background: var(--success-bg); color: var(--success); }
.t-custom { background: var(--bg2); color: var(--text2); }
.prog-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 10px; }
.prog-fill { height: 100%; border-radius: 2px; background: var(--success); transition: width .4s; }
.add-row { display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); }
.add-row input, .ask-bar input { flex: 1; padding: 10px 12px; font-size: 15px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); color: var(--text); outline: none; }
.add-row button, .ask-bar button, .action-btn { padding: 10px 14px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); cursor: pointer; white-space: nowrap; font-weight: 500; }
.news-item { padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.news-item:last-child { border-bottom: none; }
.ntag { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; margin-bottom: 5px; }
.nt-world { background: var(--info-bg); color: var(--info); }
.nt-chem { background: var(--success-bg); color: var(--success); }
.nt-invest { background: var(--warn-bg); color: var(--warn); }
.news-hl { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; }
.news-sm { font-size: 13px; color: var(--text2); margin-top: 3px; line-height: 1.5; }
.loading-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text3); padding: 4px 0; }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
.stat-card { background: var(--bg); border-radius: var(--radius-lg); padding: 14px; }
.stat-lbl { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.stat-val { font-size: 26px; font-weight: 600; color: var(--text); }
.stat-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.hist-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
.hist-item:last-child { border-bottom: none; }
.hist-date { color: var(--text2); }
.hist-dots { display: flex; gap: 5px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border2); }
.dot.done { background: var(--success); }
.q-card { background: var(--bg2); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; }
.qtag { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 6px; margin-bottom: 10px; }
.qt-relation { background: var(--danger-bg); color: var(--danger); }
.qt-self { background: var(--info-bg); color: var(--info); }
.qt-life { background: var(--success-bg); color: var(--success); }
.q-text { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.6; margin-bottom: 8px; }
.q-hint { font-size: 13px; color: var(--text2); line-height: 1.6; }
.btn-row { display: flex; gap: 8px; margin-top: 12px; }
.btn { flex: 1; padding: 10px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); cursor: pointer; font-weight: 500; }
.textarea { width: 100%; padding: 10px 12px; font-size: 14px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); resize: none; margin-top: 10px; line-height: 1.6; font-family: inherit; outline: none; }
.daily-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
.daily-item:last-child { border-bottom: none; }
.sm-chk { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.sm-chk.done { background: var(--danger-bg); border-color: var(--danger); }
.sm-chk.done::after { content:''; width:8px; height:8px; background: var(--danger); border-radius:50%; }
.daily-txt { flex: 1; color: var(--text); }
.daily-txt.done { text-decoration: line-through; color: var(--text3); }
.heart-prog-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 10px; }
.heart-prog-fill { height: 100%; border-radius: 2px; background: var(--danger); transition: width .4s; }
.counter-row { display: flex; gap: 10px; margin-bottom: 12px; }
.counter { flex: 1; background: var(--bg); border-radius: var(--radius-lg); padding: 14px 10px; text-align: center; }
.cnt-num { font-size: 24px; font-weight: 600; color: var(--text); }
.cnt-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
.exp-item { display: flex; align-items: flex-start; gap: 12px; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
.exp-item:last-child { border-bottom: none; }
.exp-cat { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 6px; margin-bottom: 4px; }
.ec-food { background: var(--warn-bg); color: var(--warn); }
.ec-outdoor { background: var(--success-bg); color: var(--success); }
.ec-culture { background: var(--info-bg); color: var(--info); }
.ec-travel { background: var(--danger-bg); color: var(--danger); }
.ec-craft { background: var(--bg2); color: var(--text2); }
.ec-sport { background: var(--success-bg); color: var(--success); }
.exp-main { flex: 1; min-width: 0; }
.exp-title { font-size: 15px; font-weight: 500; color: var(--text); }
.exp-title.done { text-decoration: line-through; color: var(--text3); }
.exp-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }
.exp-actions { display: flex; gap: 8px; flex-shrink: 0; margin-top: 2px; }
.icon-btn { background: none; border: 1px solid var(--border2); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 15px; color: var(--text2); }
.icon-btn.aw { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }
.icon-btn.ad { border-color: var(--success); color: var(--success); background: var(--success-bg); }
.filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.fbtn { padding: 5px 11px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: 20px; background: none; color: var(--text2); cursor: pointer; font-weight: 500; }
.fbtn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.ask-bar { display: flex; gap: 8px; }
.ai-resp { background: var(--bg2); border-radius: var(--radius); padding: 12px; font-size: 14px; color: var(--text); line-height: 1.6; margin-top: 10px; }
.notif-row { display: flex; align-items: center; gap: 10px; }
.notif-status { font-size: 14px; color: var(--text2); flex: 1; }
.time-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
.time-row label { font-size: 14px; color: var(--text2); }
.time-row input[type=time] { padding: 7px 10px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); outline: none; }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); border-radius: 20px; padding: 9px 18px; font-size: 13px; color: #fff; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; z-index: 200; }
.toast.show { opacity: 1; }
.quote-box { background: var(--danger-bg); border-left: 3px solid var(--danger); border-radius: 0 var(--radius) var(--radius) 0; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; color: var(--text2); line-height: 1.7; font-style: italic; }
</style>
</head>
<body>
<div class="app">

<div class="header">
  <div class="header-row">
    <div>
      <div class="greeting" id="greeting"></div>
      <div class="subdate" id="subdate"></div>
    </div>
    <div class="streak-badge" id="streak-badge">🔥 1 天</div>
  </div>
</div>

<!-- 今日 -->
<div id="tab-today" class="panel active">
  <div class="sec-label" style="margin-top:8px;">今日學習任務</div>
  <div class="card">
    <div id="task-list"></div>
    <div class="add-row">
      <input type="text" id="new-task" placeholder="新增自訂任務..." maxlength="40"/>
      <button onclick="addTask()">新增</button>
    </div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="task-prog"></div></div>
  <div class="sec-label" style="margin-top:16px;">問 AI 助理</div>
  <div class="card">
    <div class="ask-bar">
      <input type="text" id="ask-input" placeholder="例如：今天德文複習什麼？"/>
      <button onclick="askAI()">送出</button>
    </div>
    <div id="ai-area"></div>
  </div>
</div>

<!-- 新聞 -->
<div id="tab-news" class="panel">
  <div class="sec-label" style="margin-top:8px;">今日新聞彙整</div>
  <div class="card" id="news-card">
    <div class="loading-pill"><div class="spinner"></div>AI 搜尋最新資訊中...</div>
  </div>
</div>

<!-- 學哥 -->
<div id="tab-heart" class="panel">
  <div class="sec-label" style="margin-top:8px;">今日思考題</div>
  <div class="q-card">
    <div class="qtag" id="qtag"></div>
    <div class="q-text" id="qtext"></div>
    <div class="q-hint" id="qhint"></div>
    <div class="btn-row">
      <button class="btn" onclick="nextQ()">換一題</button>
      <button class="btn" id="save-btn" onclick="toggleSaved()">⭐ 收藏</button>
    </div>
    <textarea class="textarea" id="q-note" rows="3" placeholder="寫下你的想法..." oninput="saveQNote()"></textarea>
  </div>
  <div class="quote-box">「為什麼他愛我，是因為他需要我這樣的人，所以他會為了我付出他可以付出的愛。」</div>
  <div class="sec-label">每天對學哥做的小事</div>
  <div class="card">
    <div id="daily-list"></div>
    <div class="heart-prog-bar"><div class="heart-prog-fill" id="heart-prog"></div></div>
  </div>
  <div class="sec-label">關係平衡筆記</div>
  <div class="card">
    <div style="font-size:13px;color:var(--text2);margin-bottom:6px;">開銷、個性互補、牡羊火象⋯ 想到什麼記在這裡</div>
    <textarea class="textarea" id="balance-note" rows="3" placeholder="今天的想法..." oninput="saveBalance()" style="margin-top:0;"></textarea>
  </div>
</div>

<!-- 體驗 -->
<div id="tab-exp" class="panel">
  <div class="counter-row" style="margin-top:8px;">
    <div class="counter"><div class="cnt-num" id="cnt-want">0</div><div class="cnt-lbl">想去</div></div>
    <div class="counter"><div class="cnt-num" id="cnt-done">0</div><div class="cnt-lbl">完成</div></div>
    <div class="counter"><div class="cnt-num" id="cnt-left">0</div><div class="cnt-lbl">待探索</div></div>
  </div>
  <div class="filter-row">
    <button class="fbtn active" onclick="filterExp('all',this)">全部</button>
    <button class="fbtn" onclick="filterExp('want',this)">想去</button>
    <button class="fbtn" onclick="filterExp('done',this)">完成</button>
    <button class="fbtn" onclick="filterExp('food',this)">美食</button>
    <button class="fbtn" onclick="filterExp('outdoor',this)">戶外</button>
    <button class="fbtn" onclick="filterExp('culture',this)">文化</button>
    <button class="fbtn" onclick="filterExp('travel',this)">旅遊</button>
  </div>
  <div class="card" id="exp-list"></div>
</div>

<!-- 紀錄 -->
<div id="tab-stats" class="panel">
  <div class="stat-grid" style="margin-top:8px;">
    <div class="stat-card"><div class="stat-lbl">連續打卡</div><div class="stat-val" id="s-streak">-</div><div class="stat-sub">天</div></div>
    <div class="stat-card"><div class="stat-lbl">本週完成率</div><div class="stat-val" id="s-rate">-</div><div class="stat-sub">%</div></div>
    <div class="stat-card"><div class="stat-lbl">累計完成</div><div class="stat-val" id="s-total">-</div><div class="stat-sub">項任務</div></div>
    <div class="stat-card"><div class="stat-lbl">最長連續</div><div class="stat-val" id="s-best">-</div><div class="stat-sub">天</div></div>
  </div>
  <div class="sec-label">最近 7 天</div>
  <div class="card" id="hist-list"></div>
</div>

<!-- 設定 -->
<div id="tab-settings" class="panel">
  <div class="sec-label" style="margin-top:8px;">推播通知</div>
  <div class="card">
    <div class="notif-row">
      <div class="notif-status" id="notif-status">載入中...</div>
      <button class="action-btn" id="notif-btn" onclick="toggleNotif()">-</button>
    </div>
    <div class="time-row"><label>早上提醒</label><input type="time" id="t-morning" value="08:00" onchange="saveNotifTime()"/></div>
    <div class="time-row"><label>晚上提醒</label><input type="time" id="t-evening" value="21:00" onchange="saveNotifTime()"/></div>
    <div style="margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border);">
      <button class="action-btn" onclick="testNotif()" style="width:100%;">發送測試通知</button>
    </div>
  </div>
  <div class="sec-label">加入手機主畫面</div>
  <div class="card" style="font-size:14px;color:var(--text2);line-height:1.8;">
    Safari 瀏覽器開啟此頁面<br>
    → 點底部「分享」按鈕 <i class="ti ti-share"></i><br>
    → 選「加入主畫面」<br>
    → 桌面就有 App 圖示了！
  </div>
  <div class="sec-label">資料管理</div>
  <div class="card">
    <button class="action-btn" onclick="clearToday()" style="width:100%;margin-bottom:10px;">重置今日打勾</button>
    <button class="action-btn" onclick="clearAll()" style="width:100%;color:var(--danger);">清除所有資料</button>
  </div>
</div>

<!-- 底部導覽 -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="sw('today',this)" id="nav-today">
    <i class="ti ti-home"></i><span>今日</span>
  </button>
  <button class="nav-item" onclick="sw('news',this)" id="nav-news">
    <i class="ti ti-news"></i><span>新聞</span>
  </button>
  <button class="nav-item" onclick="sw('heart',this)" id="nav-heart">
    <i class="ti ti-heart"></i><span>學哥</span>
  </button>
  <button class="nav-item" onclick="sw('exp',this)" id="nav-exp">
    <i class="ti ti-map-2"></i><span>體驗</span>
  </button>
  <button class="nav-item" onclick="sw('stats',this)" id="nav-stats">
    <i class="ti ti-chart-bar"></i><span>紀錄</span>
  </button>
  <button class="nav-item" onclick="sw('settings',this)" id="nav-settings">
    <i class="ti ti-settings"></i><span>設定</span>
  </button>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
const SK='fulldash_v3';
function load(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return{};}}
function save(d){localStorage.setItem(SK,JSON.stringify(d));}
let db=load();
if(!db.history)db.history={};
if(!db.custom)db.custom=[];
if(!db.notifTime)db.notifTime={morning:'08:00',evening:'21:00'};
if(!db.streak)db.streak={current:0,best:0};
if(!db.totalDone)db.totalDone=0;
if(!db.qIndex)db.qIndex=0;
if(!db.notes)db.notes={};
if(!db.saved)db.saved=[];
if(!db.expStatus)db.expStatus={};
if(!db.dailyDone)db.dailyDone={};
if(!db.balanceNote)db.balanceNote='';

const DAYS=['日','一','二','三','四','五','六'];
const now=new Date();
const todayStr=now.toISOString().slice(0,10);
const dow=now.getDay();
const isWE=dow===0||dow===6;
const hr=now.getHours();

document.getElementById('greeting').textContent=hr<12?'早安！':hr<18?'午安！':'晚安！';
document.getElementById('subdate').textContent=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()+' 週'+DAYS[dow];

const baseWeekday=[
  {id:'en1',time:'morning',label:'早上',title:'Engoo 文章默讀',meta:'Cambly Daily Lesson・5 分鐘',fixed:true},
  {id:'en2',time:'noon',label:'午休',title:'ESL Podcast 聆聽',meta:'6 Minute English / All Ears English・10-15 分鐘',fixed:true},
  {id:'en3',time:'night',label:'睡前',title:'英文日記 3 句',meta:'用英文描述今天發生的事・5 分鐘',fixed:true},
  {id:'de1',time:'noon',label:'每日',title:'德文詞彙複習',meta:'Anki 單字複習・15 分鐘',fixed:true},
];
const baseWeekend=[

function updateStreak(){
  let s=0;
  for(let i=0;i<365;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const h=db.history[ds];
    if(!h||!Object.keys(h).some(k=>h[k]))break;
    s++;
  }
  db.streak.current=s;db.streak.best=Math.max(db.streak.best||0,s);
  save(db);
  document.getElementById('streak-badge').textContent='🔥 '+s+' 天';
}

function calcWeekRate(){
  let tot=0,dn=0;
  for(let i=0;i<7;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const h=db.history[d.toISOString().slice(0,10)];
    if(h){const k=Object.keys(h);tot+=k.length;dn+=k.filter(x=>h[x]).length;}
  }
  return tot>0?Math.round(dn/tot*100):0;
}

function renderStats(){
  document.getElementById('s-streak').textContent=db.streak.current||0;
  document.getElementById('s-best').textContent=db.streak.best||0;
  document.getElementById('s-rate').textContent=calcWeekRate();
  document.getElementById('s-total').textContent=db.totalDone||0;
  const all=allTasks();
  let rows='';
  for(let i=0;i<7;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const lbl=i===0?'今天':(d.getMonth()+1)+'/'+d.getDate();
    const h=db.history[ds]||{};
    const dots=all.map(t=>`<div class="dot ${h[t.id]?'done':''}"></div>`).join('');
    rows+=`<div class="hist-item"><span class="hist-date">${lbl}</span><div class="hist-dots">${dots}</div></div>`;
  }
  document.getElementById('hist-list').innerHTML=rows;
}

let newsLoaded=false;
async function loadNews(){
  newsLoaded=true;
  const card=document.getElementById('news-card');
  card.innerHTML='<div class="loading-pill"><div class="spinner"></div>載入最新新聞中...</div>';
  const KEY='pub_9eaf82fc747e458b890ab8cdb3020d8d';
  const sources=[
    {label:'世界大事',cls:'nt-world',q:'world',lang:'en'},
    {label:'化工新技術',cls:'nt-chem',q:'chemical engineering',lang:'en'},
    {label:'投資趨勢',cls:'nt-invest',q:'stock market finance',lang:'en'},
  ];
  async function fetchNews(s){
    const url=`https://newsdata.io/api/1/news?apikey=${KEY}&q=${encodeURIComponent(s.q)}&language=${s.lang}&size=1`;
    const res=await fetch(url,{signal:AbortSignal.timeout(8000)});
    const data=await res.json();
    if(!data.results||!data.results[0])throw new Error('no result');
    const item=data.results[0];
    return{
      label:s.label,cls:s.cls,
      title:(item.title||'').slice(0,80),
      summary:(item.description||'').replace(/<[^>]+>/g,'').slice(0,120),
      link:item.link||''
    };
  }
  const results=await Promise.allSettled(sources.map(fetchNews));
  let html='';
  results.forEach((r,i)=>{
    const s=sources[i];
    if(r.status==='fulfilled'){
      const n=r.value;
      html+=`<div class="news-item" onclick="openLink('${n.link}')" style="cursor:pointer;">
        <div class="ntag ${n.cls}">${n.label}</div>
        <div class="news-hl">${n.title}</div>
        <div class="news-sm">${n.summary}</div>
        <div style="font-size:11px;color:var(--info);margin-top:4px;">點擊閱讀全文 →</div>
      </div>`;
    } else {
      html+=`<div class="news-item">
        <div class="ntag ${s.cls}">${s.label}</div>
        <div class="news-hl" style="color:var(--text3);">暫時無法載入</div>
      </div>`;
    }
  });
  card.innerHTML=html||'<div style="font-size:14px;color:var(--text2);">無法載入新聞，請稍後再試。</div>';
}
function openLink(url){if(url)window.open(url,'_blank');}

    const data=await res.json();

function renderNotif(){
  const s=document.getElementById('notif-status');
  const b=document.getElementById('notif-btn');
  if(!('Notification'in window)){s.textContent='此瀏覽器不支援通知';b.style.display='none';return;}
  if(Notification.permission==='granted'){s.textContent='通知已開啟 ✓';b.textContent='已開啟';}
  else if(Notification.permission==='denied'){s.textContent='通知已被封鎖（請至設定開啟）';b.style.display='none';}
  else{s.textContent='尚未開啟通知';b.textContent='開啟通知';}
  document.getElementById('t-morning').value=db.notifTime.morning;
  document.getElementById('t-evening').value=db.notifTime.evening;
}
function toggleNotif(){
  if(Notification.permission==='granted'){showToast('可調整下方時間設定');return;}
  Notification.requestPermission().then(p=>{renderNotif();if(p==='granted'){showToast('通知已開啟！');scheduleNotif();}});
}
function saveNotifTime(){
  db.notifTime.morning=document.getElementById('t-morning').value;
  db.notifTime.evening=document.getElementById('t-evening').value;

function testNotif(){
  if(Notification.permission!=='granted'){showToast('請先開啟通知權限');return;}
  new Notification('每日提醒',{body:'今天的任務準備好了！英文和德文加油 🌟'});
  showToast('測試通知已發送');
}
function scheduleNotif(){
  if(Notification.permission!=='granted')return;
  if(window._ni)clearInterval(window._ni);
  window._ni=setInterval(()=>{
    const n=new Date();
    const hm=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
    if(hm===db.notifTime.morning)new Notification('早安！今日任務',{body:'記得完成英文和德文學習 🌟'});
    if(hm===db.notifTime.evening){
      const rem=allTasks().filter(t=>!db.history[todayStr][t.id]).length;
      new Notification('晚間提醒',{body:rem>0?`還有 ${rem} 項任務未完成，加油！`:'今天所有任務完成了 🎉'});
    }
  },60000);
}

}
